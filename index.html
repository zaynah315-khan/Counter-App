 <!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <title>Counter App</title>

</head>

<body>

    <div class="background"></div>

    <div class="card">

        <h1>Counter App</h1>

        <p class="subtitle">
            Click the button and discover your special numbers.
        </p>

        <div class="counter-circle">

            <h2 id="counter-display">0</h2>

            <p>COUNT</p>

        </div>

        <button id="my-btn">
            Count Up
        </button>

        <!-- Message Box -->
        <div id="special-message" class="message-box">
            ✨ Keep counting to discover your special numbers. ✨
        </div>

        <!-- Special Numbers -->
        <div class="special-box">

            <h3>⭐ Special Numbers ⭐</h3>

            <p class="numbers">
                <span>4</span>
                <span>7</span>
                <span>9</span>
                <span>12</span>
                <span>15</span>
            </p>

            <p class="numbers">
                <span>20</span>
                <span>27</span>
                <span>31</span>
                <span>41</span>
                <span>50</span>
            </p>

            <small>
                Reach these numbers to unlock a special message.
            </small>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
